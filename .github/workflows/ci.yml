name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ShopAPI.sln

      - name: Build
        run: dotnet build ShopAPI.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ShopAPI.Tests/ShopAPI.Tests.csproj --configuration Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ShopAPI.Frontend/package-lock.json

      - name: Install and build
        working-directory: ShopAPI.Frontend
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t shopapi:test .

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ShopAPI.Frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ShopAPI.Frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ShopAPI.Frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ShopAPI.Frontend
        run: npm run test:e2e
        env:
          CI: true
